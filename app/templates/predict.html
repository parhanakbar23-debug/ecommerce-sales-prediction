<!-- templates/predict.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: #050816;

            color: white;

            font-family: 'Segoe UI', sans-serif;

            overflow-x: hidden;
        }

        /* SIDEBAR */

        .sidebar {

            position: fixed;

            left: 0;
            top: 0;

            width: 260px;
            height: 100vh;

            background: #0f172a;

            padding: 30px 20px;

            border-right: 1px solid rgba(255, 255, 255, 0.08);

            z-index: 1000;
        }

        .logo {

            font-size: 28px;
            font-weight: bold;

            color: #8b5cf6;

            margin-bottom: 50px;
        }

        .menu-item {

            display: flex;

            align-items: center;

            gap: 15px;

            color: white;

            text-decoration: none;

            padding: 15px 18px;

            border-radius: 15px;

            margin-bottom: 15px;

            transition: 0.3s;
        }

        .menu-item:hover {

            background: #8b5cf6;

            transform: translateX(5px);
        }

        /* MAIN */

        .main-content {

            margin-left: 260px;

            padding: 30px;
        }

        .page-title {

            margin-bottom: 30px;
        }

        .page-title h1 {

            font-size: 45px;

            font-weight: bold;
        }

        .page-title span {

            color: #8b5cf6;
        }

        /* FORM */

        .predict-card {

            background: #0f172a;

            padding: 40px;

            border-radius: 30px;

            border: 1px solid rgba(255, 255, 255, 0.08);

            max-width: 900px;
        }

        .form-label {

            color: #cbd5e1;

            margin-bottom: 10px;
        }

        .form-control {

            background: #111827;

            border: none;

            color: white;

            padding: 15px;

            border-radius: 15px;
        }

        .form-control:focus {

            background: #111827;

            color: white;

            border: 1px solid #8b5cf6;

            box-shadow: none;
        }

        .btn-custom {

            width: 100%;

            background: #8b5cf6;

            border: none;

            padding: 15px;

            border-radius: 15px;

            color: white;

            font-weight: bold;

            transition: 0.3s;

            margin-top: 15px;
        }

        .btn-custom:hover {

            background: #7c3aed;

            transform: translateY(-2px);
        }

        /* RESULT */

        .result-box {

            margin-top: 30px;

            background: linear-gradient(135deg,
                    #10b981,
                    #059669);

            padding: 30px;

            border-radius: 25px;

            text-align: center;
        }

        .result-box h2 {

            font-size: 45px;

            font-weight: bold;
        }

        /* RESPONSIVE */

        @media(max-width:768px) {

            .sidebar {

                position: relative;

                width: 100%;

                height: auto;

                display: flex;

                flex-direction: column;

                align-items: center;
            }

            .main-content {

                margin-left: 0;

                padding: 20px;
            }

            .page-title h1 {

                font-size: 35px;
            }

            .predict-card {

                padding: 25px;
            }
        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-cart-shopping"></i>
            E-Commerce AI
        </div>

        <a href="/" class="menu-item">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>

        <a href="/predict" class="menu-item">
            <i class="fa-solid fa-chart-line"></i>
            Prediksi
        </a>

        <a href="/comparison" class="menu-item">
            <i class="fa-solid fa-brain"></i>
            Model AI
        </a>

    </div>

    <!-- MAIN -->

    <div class="main-content">

        <!-- TITLE -->

        <div class="page-title">

            <h1>
                Sales <span>Prediction</span>
            </h1>

            <p>
                Prediksi total pembayaran menggunakan
                model Machine Learning.
            </p>

        </div>

        <!-- FORM -->

        <div class="predict-card">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Total Quantity
                        </label>

                        <input type="number" class="form-control" name="total_qty" required>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Total Weight
                        </label>

                        <input type="number" class="form-control" name="total_weight_gr" required>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Total Discount
                        </label>

                        <input type="number" class="form-control" name="total_diskon" required>

                    </div>

                    <div class="col-md-6 mb-4">

                        <label class="form-label">
                            Product Categories
                        </label>

                        <input type="number" class="form-control" name="num_product_categories" required>

                    </div>

                    <div class="col-md-12 mb-4">

                        <label class="form-label">
                            Shipping Cost
                        </label>

                        <input type="number" class="form-control" name="ongkir" required>

                    </div>

                </div>

                <button type="submit" class="btn-custom">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    Predict Now
                </button>

            </form>

            {% if prediction %}

            <div class="result-box">

                <h4>
                    Prediction Result
                </h4>

                <h2>
                    Rp {{ "{:,.0f}".format(prediction) }}
                </h2>

            </div>

            {% endif %}

        </div>

    </div>

</body>

</html>
